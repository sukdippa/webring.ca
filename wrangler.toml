name = "webring-ca"
main = "src/index.tsx"
compatibility_date = "2025-01-01"

# Replace PLACEHOLDER_KV_ID and PLACEHOLDER_PREVIEW_KV_ID with actual KV namespace IDs.
# Create them with: npx wrangler kv namespace create WEBRING
[[kv_namespaces]]
binding = "WEBRING"
id = "PLACEHOLDER_KV_ID"
preview_id = "PLACEHOLDER_PREVIEW_KV_ID"

[triggers]
crons = ["0 0 * * *", "0 0 * * 0"]
