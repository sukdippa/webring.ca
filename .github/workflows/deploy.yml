name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - run: npm test

      - run: npm run typecheck

      - run: npm run typecheck:scripts

      - name: Check if Worker code changed
        id: check
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -qvE '^members/'; then
            echo "worker_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "worker_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy Worker
        if: steps.check.outputs.worker_changed == 'true'
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Seed KV
        run: npx tsx scripts/seed.ts --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
