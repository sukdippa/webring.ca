name: Validate New Member

on:
  pull_request_target:
    paths:
      - 'members/*.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Overlay PR member files
        run: |
          git fetch origin pull/${{ github.event.pull_request.number }}/head
          for file in $(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} -- 'members/*.json'); do
            git show ${{ github.event.pull_request.head.sha }}:"$file" > "$file" 2>/dev/null || rm -f "$file"
          done

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Run validation
        id: validate
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set +e
          OUTPUT=$(npx tsx scripts/validate.ts 2>&1)
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          {
            echo "output<<VALIDATION_EOF"
            echo "$OUTPUT"
            echo "VALIDATION_EOF"
          } >> "$GITHUB_OUTPUT"
          exit 0

      - name: Post PR comment
        uses: actions/github-script@v7
        env:
          VALIDATION_OUTPUT: ${{ steps.validate.outputs.output }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: process.env.VALIDATION_OUTPUT
            });

      - name: Exit with validation result
        if: steps.validate.outputs.exit_code != '0'
        run: exit 1
